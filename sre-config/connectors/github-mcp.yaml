# GitHub MCP Connector — Dataplane v2 API format
# Created by configure-sre-agent.ps1 when -GitHubPat is provided
# Reference: PUT {agentEndpoint}/api/v2/extendedAgent/connectors/github-mcp
api_version: azuresre.ai/v2
kind: DataConnector
spec:
  name: github-mcp
  dataConnectorType: StreamableHttp
  dataSource: github
  serverUri: https://api.githubcopilot.com/mcp/
  authenticationType: BearerToken
  # Token is passed at runtime via -GitHubPat parameter
